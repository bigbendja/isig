# ============================================================
# SIGINT DataCenter Pro — Docker Compose
# Fase 1: Infraestructura base
# Servicios: PostgreSQL + Neo4j + Redis + Ollama + Adminer
# ============================================================
# Uso:
#   Desarrollo:  docker compose up -d
#   Producción:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Parar:       docker compose down
#   Reset total: docker compose down -v
# ============================================================

name: sigint

services:

  # ──────────────────────────────────────────────────────────
  # POSTGRESQL — Motor relacional principal
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: sigint_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sigint}
      POSTGRES_USER: ${POSTGRES_USER:-sigint_admin}
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?ERROR: Define POSTGRES_PASSWORD en .env}"
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=es_ES.UTF-8 --lc-ctype=es_ES.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
      - ./database/seeds:/seeds:ro
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - sigint_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sigint_admin} -d ${POSTGRES_DB:-sigint}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
     - postgres
     - -c
     - shared_preload_libraries=pg_stat_statements
     - -c
     - pg_stat_statements.track=all
     - -c
     - max_connections=200
     - -c
     - shared_buffers=256MB
     - -c
     - effective_cache_size=768MB
     - -c
     - work_mem=16MB
     - -c
     - maintenance_work_mem=128MB
     - -c
     - random_page_cost=1.1
     - -c
     - effective_io_concurrency=200
     - -c
     - wal_buffers=16MB
     - -c
     - checkpoint_completion_target=0.9
     - -c
     - log_min_duration_statement=1000
     - -c
     - log_checkpoints=on
     - -c
     - log_connections=on
     - -c
     - log_lock_waits=on

  # ──────────────────────────────────────────────────────────
  # NEO4J — Grafo de vínculos y relaciones
  # ──────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: sigint_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:?ERROR: Define NEO4J_PASSWORD en .env}"
     # NEO4J_PLUGINS: '["graph-data-science", "apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: "gds.*,apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "gds.*,apoc.*"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_logs_debug_level: INFO
      NEO4J_server_default__listen__address: 0.0.0.0
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
      - ./database/neo4j:/var/lib/neo4j/import
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    networks:
      - sigint_net
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "-q", "http://localhost:7474/"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ──────────────────────────────────────────────────────────
  # REDIS — Caché, sesiones, colas y pub/sub
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: sigint_redis
    restart: unless-stopped
    command: >
      redis-server
        --requirepass "${REDIS_PASSWORD:?ERROR: Define REDIS_PASSWORD en .env}"
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --save 900 1
        --save 300 10
        --save 60 10000
        --loglevel notice
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - sigint_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # OLLAMA — Servidor de modelos LLM locales
  # Compatible con cualquier modelo GGUF/Apache 2.0
  # ──────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: sigint_ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0
      OLLAMA_MODELS: /models
      OLLAMA_MAX_LOADED_MODELS: 2
      OLLAMA_NUM_PARALLEL: 2
    volumes:
      - ollama_models:/models
      - ollama_data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    networks:
      - sigint_net
    # Descomentar si tienes GPU NVIDIA:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # ADMINER — UI de administración de PostgreSQL (dev only)
  # Acceso: http://localhost:8080
  # ──────────────────────────────────────────────────────────
  adminer:
    image: adminer:4.8.1
    container_name: sigint_adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    networks:
      - sigint_net
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev   # Solo arranca con: docker compose --profile dev up

  # ──────────────────────────────────────────────────────────
  # REDIS COMMANDER — UI de Redis (dev only)
  # Acceso: http://localhost:8081
  # ──────────────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: sigint_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD}"
      HTTP_USER: admin
      HTTP_PASSWORD: ${REDIS_UI_PASSWORD:-admin123}
    ports:
      - "${REDIS_UI_PORT:-8081}:8081"
    networks:
      - sigint_net
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - dev

  # ──────────────────────────────────────────────────────────
  # BACKEND — API principal
  # ──────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: sigint_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - sigint_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - .env


    
  # ──────────────────────────────────────────────────────────
  # FRONTEND — UI
  # ──────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sigint_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - sigint_net
    depends_on:
      - backend


# ──────────────────────────────────────────────────────────
# VOLÚMENES PERSISTENTES
# ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  redis_data:
    driver: local
  ollama_models:
    driver: local
  ollama_data:
    driver: local

# ──────────────────────────────────────────────────────────
# RED INTERNA
# ──────────────────────────────────────────────────────────
networks:
  sigint_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
